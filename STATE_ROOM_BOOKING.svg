ext fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="84.0273" x="89.5" y="454.6426">CANCELLED</text></g><g class="end_entity" data-qualified-name=".end." data-source-line="11" id="ent0010"><ellipse cx="206.5" cy="580.1094" fill="none" rx="11" ry="11" style="stroke:#222222;stroke-width:1;"/><ellipse cx="206.5" cy="580.1094" fill="#222222" rx="6" ry="6" style="stroke:#222222;stroke-width:1;"/></g><g class="entity" data-qualified-name="GMN13" data-source-line="15" id="ent0014"><path d="M139,162.1094 L139,179.6094 L104.02,183.6094 L139,187.6094 L139,204.8125 A0,0 0 0 0 139,204.8125 L386.1606,204.8125 A0,0 0 0 0 386.1606,204.8125 L386.1606,172.1094 L376.1606,162.1094 L139,162.1094 A0,0 0 0 0 139,162.1094" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M376.1606,162.1094 L376.1606,172.1094 L386.1606,172.1094 L376.1606,162.1094" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="103.3271" x="145" y="180.6045">Creation requires:</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="226.1606" x="145" y="196.9561">Room.isAvailable(MeetingSlot) == true.</text></g><g class="entity" data-qualified-name="GMN16" data-source-line="20" id="ent0017"><path d="M301.5,430.6094 L301.5,489.6641 L565.2788,489.6641 L565.2788,440.6094 L555.2788,430.6094 L301.5,430.6094" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M555.2788,430.6094 L555.2788,440.6094 L565.2788,440.6094 L555.2788,430.6094" fill="#FEFFDD" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="200.1606" x="307.5" y="449.1045">Cancelled booking stays in history.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="242.7788" x="307.5" y="465.4561">The ClassMeeting may remain